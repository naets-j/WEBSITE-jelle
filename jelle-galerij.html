      h1 {

      .gallery-container {

        column-gap: 12px;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .gallery-item {
        break-inside: avoid;
        margin-bottom: 12px;
      }

      .gallery-item img {
        width: 100%;
        display: block;
        border-radius: 6px;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          opacity 0.2s ease;
      }

      .gallery-item img:hover {
        transform: scale(1.02);
        opacity: 0.9;
      }

      /* Modal */
      #myModal {
        display: none;
        position: fixed;
        z-index: 9999;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      #modal-image {
        max-width: 90%;
        max-height: 85vh;
        border-radius: 6px;
      }

      .modal-controls {
        margin-top: 16px;
        display: flex;
        gap: 20px;
      }

      .modal-controls button {
        background: #f7942a;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 1.2rem;
        border-radius: 6px;
        cursor: pointer;
      }

      .modal-close {
        position: absolute;
        top: 20px;
        right: 30px;
        font-size: 2rem;
        color: white;
        cursor: pointer;
        background: none;
        border: none;
      }

      @media (max-width: 768px) {
        .gallery-container {
          column-count: 2;
        }
      }

      @media (max-width: 480px) {
        .gallery-container {
          column-count: 1;
        }
      }
    </style>

    <script>
      // Probeer automatisch .jpeg als .jpg niet gevonden wordt
      document.querySelectorAll(".gallery-item img").forEach((img) => {
        img.onerror = function () {
          if (this.src.endsWith(".jpg")) {
            this.src = this.src.replace(".jpg", ".jpeg");
          }
        };
      });

      // Bouw de lijst van afbeeldingen automatisch op vanuit de galerij
      const images = Array.from(document.querySelectorAll(".gallery-item img"));
      const imagesArray = images.map((img) => img.src);
      let slideIndex = 0;

      function openModal(imgElement) {
        slideIndex = imagesArray.indexOf(imgElement.src);
        document.getElementById("myModal").style.display = "flex";
        document.getElementById("modal-image").src = imgElement.src;
      }

      function closeModal() {
        document.getElementById("myModal").style.display = "none";
      }

      function plusSlides(n) {
        slideIndex += n;
        if (slideIndex >= imagesArray.length) slideIndex = 0;
        if (slideIndex < 0) slideIndex = imagesArray.length - 1;
        document.getElementById("modal-image").src = imagesArray[slideIndex];
      }

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") closeModal();
        else if (event.key === "ArrowLeft") plusSlides(-1);
        else if (event.key === "ArrowRight") plusSlides(1);
      });
    </script>
