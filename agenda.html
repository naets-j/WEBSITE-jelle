    <section>
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Agenda - Supportersclub Jelle Naets</title>
      <link rel="stylesheet" href="style.css" />
    </section>
    <section class="agenda">
      <main class="main-content">
        <h1 class="agenda-heading text-xxl">Wedstrijd agenda</h1>
        <div id="calendar-container"></div>
      </main>
      <script>
        document.addEventListener("DOMContentLoaded", () => {
          const calendarContainer =
            document.getElementById("calendar-container");

          const loadEvents = () => {
            const events = JSON.parse(localStorage.getItem("events")) || [];
            calendarContainer.innerHTML = "";
            if (events.length === 0) {
              calendarContainer.innerHTML = "<p>Geen geplande wedstrijden.</p>";
              return;
            }

            events.sort((a, b) => new Date(a.date) - new Date(b.date));

            events.forEach((event) => {
              const eventDiv = document.createElement("div");
              eventDiv.classList.add("event-item");

              let eventDetailsHtml = "";

              // Voeg Datum en Tijd toe met flexbox opmaak
              if (event.date || event.time) {
                eventDetailsHtml += `<div class="date-time-flex">`;
                if (event.date) {
                  eventDetailsHtml += `<span><strong>Datum:</strong> ${event.date}</span>`;
                }
                if (event.time) {
                  eventDetailsHtml += `<span><strong>Tijd:</strong> ${event.time}</span>`;
                }
                eventDetailsHtml += `</div>`;
              }

              // Voeg overige velden alleen toe als ze niet leeg zijn
              if (event.location) {
                eventDetailsHtml += `<div class="event-detail-row"><strong>Locatie:</strong> ${event.location}</div>`;
              }
              if (event.type) {
                eventDetailsHtml += `<div class="event-detail-row"><strong>Wedstrijd:</strong> ${event.type}</div>`;
              }

              // Link wordt alleen weergegeven als er een link is
              const eventLinkHtml = event.link
                ? `<a href="${event.link}" target="_blank" class="event-link">Organisatie bekijken</a>`
                : "";

              eventDiv.innerHTML = `
                            <div class="event-details">
                                ${eventDetailsHtml}
                            </div>
                            ${eventLinkHtml}
                        `;

              calendarContainer.appendChild(eventDiv);
            });
          };

          loadEvents();
        });
      </script>
    </section>
